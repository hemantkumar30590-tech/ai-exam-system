<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate AI Exam System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
font-size:55px;
margin-bottom:30px;
background:linear-gradient(90deg,#4cc9ff,#9b5cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

select{
padding:18px;
border:none;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
font-size:18px;
outline:none;
backdrop-filter:blur(10px);
}

button{
padding:18px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.generate-btn{
width:100%;
background:linear-gradient(90deg,#4cc9ff,#9b5cff);
color:white;
margin-bottom:20px;
}

.generate-btn:hover{
transform:scale(1.03);
}

.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:25px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
font-size:20px;
}

.progress{
width:100%;
height:12px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-bottom:25px;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#4cc9ff,#9b5cff);
transition:0.5s;
}

#question{
font-size:28px;
margin-bottom:25px;
line-height:1.5;
}

.options{
display:grid;
gap:15px;
}

.option-btn{
background:rgba(255,255,255,0.08);
color:white;
text-align:left;
}

.option-btn:hover{
background:#2f3d7a;
}

.correct{
background:#16a34a !important;
}

.wrong{
background:#dc2626 !important;
}

#explanation{
margin-top:25px;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:15px;
line-height:1.7;
display:none;
}

.next-btn{
margin-top:20px;
width:100%;
background:linear-gradient(90deg,#4cc9ff,#9b5cff);
color:white;
display:none;
}

.loading{
text-align:center;
font-size:24px;
padding:30px;
}

@media(max-width:700px){

h1{
font-size:40px;
}

.controls{
grid-template-columns:1fr;
}

#question{
font-size:22px;
}

}

</style>
</head>
<body>

<div class="container">

<h1>Ultimate AI Exam System</h1>

<div class="controls">

<select id="subject">

<option>History</option>
<option>Geography</option>
<option>Polity</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Biology</option>
<option>Math</option>
<option>Reasoning</option>
<option>English</option>
<option>Computer</option>
<option>Current Affairs</option>
<option>CG GK</option>
<option>UPSC</option>
<option>SSC</option>
<option>Railway</option>
<option>Vyapam</option>

</select>

<select id="difficulty">

<option>Easy</option>
<option>Medium</option>
<option>Hard</option>

</select>

</div>

<button class="generate-btn" onclick="generateMCQ()">
Generate AI MCQ
</button>

<div class="card">

<div class="top-bar">

<div>Score: <span id="score">0</span></div>

<div>Time: <span id="timer">0</span>s</div>

</div>

<div class="progress">

<div class="progress-fill" id="progressFill"></div>

</div>

<div id="question">

Click "Generate AI MCQ"

</div>

<div class="options" id="options"></div>

<div id="explanation"></div>

<button class="next-btn" id="nextBtn" onclick="generateMCQ()">
Next Question
</button>

</div>

</div>

<script>

const API_KEY = "AIzaSyBWrtPLWF9lNnGURmXG-Gx1nvRMXANdKM4";

let score = 0;
let timer = 0;
let timerInterval;
let questionCount = 0;

function startTimer(){

clearInterval(timerInterval);

timer = 0;

document.getElementById("timer").innerText = timer;

timerInterval = setInterval(()=>{

timer++;

document.getElementById("timer").innerText = timer;

},1000);

}

async function generateMCQ(){

startTimer();

document.getElementById("nextBtn").style.display = "none";

document.getElementById("explanation").style.display = "none";

document.getElementById("question").innerHTML =
'<div class="loading">⏳ AI Generating Question...</div>';

document.getElementById("options").innerHTML = "";

const subject =
document.getElementById("subject").value;

const difficulty =
document.getElementById("difficulty").value;

const prompt = `
Generate ONE competitive exam MCQ in Hindi.

Subject: ${subject}
Difficulty: ${difficulty}

Return ONLY pure JSON.

{
"question":"question here",
"options":["A","B","C","D"],
"answer":"correct option",
"explanation":"short explanation"
}
`;

try{

const response = await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
{
parts:[
{
text:prompt
}
]
}
],

generationConfig:{
temperature:0.9,
responseMimeType:"application/json"
}

})

}

);

const data = await response.json();

console.log(data);

if(data.error){

document.getElementById("question").innerHTML =
"❌ " + data.error.message;

return;

}

const text =
data.candidates[0].content.parts[0].text;

const cleanText = text
.replace(/```json/g,"")
.replace(/```/g,"")
.trim();

const mcq = JSON.parse(cleanText);

showQuestion(mcq);

questionCount++;

updateProgress();

}catch(error){

console.log(error);

document.getElementById("question").innerHTML =
"❌ Error generating MCQ";

}

}

function showQuestion(mcq){

document.getElementById("question").innerHTML =
mcq.question;

let html = "";

mcq.options.forEach(option=>{

html += `

<button class="option-btn"

onclick="checkAnswer(
this,
\`${option}\`,
\`${mcq.answer}\`,
\`${mcq.explanation}\`
)">

${option}

</button>

`;

});

document.getElementById("options").innerHTML = html;

}

function checkAnswer(button,selected,correct,explanation){

clearInterval(timerInterval);

const buttons =
document.querySelectorAll(".option-btn");

buttons.forEach(btn=>{

btn.disabled = true;

if(btn.innerText.trim() === correct.trim()){

btn.classList.add("correct");

}

});

if(selected.trim() === correct.trim()){

score++;

document.getElementById("score").innerText = score;

button.classList.add("correct");

}else{

button.classList.add("wrong");

}

document.getElementById("explanation").style.display =
"block";

document.getElementById("explanation").innerHTML =

`
<h3>Explanation:</h3>
<br>
${explanation}
`;

document.getElementById("nextBtn").style.display =
"block";

}

function updateProgress(){

const progress =
(questionCount % 10) * 10;

document.getElementById("progressFill").style.width =
progress + "%";

}

</script>

</body>
</html>
