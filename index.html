<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate AI Exam System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
padding:20px;
min-height:100vh;
overflow-x:hidden;
}

.container{
max-width:900px;
margin:auto;
}

.title{
font-size:50px;
font-weight:bold;
text-align:center;
margin-bottom:25px;
background:linear-gradient(to right,#4cc9ff,#9b5cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.top-panel{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

select,button{
padding:14px;
border:none;
border-radius:15px;
font-size:16px;
}

select{
background:rgba(255,255,255,0.08);
color:white;
backdrop-filter:blur(10px);
}

button{
background:linear-gradient(45deg,#4cc9ff,#9b5cff);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:25px;
backdrop-filter:blur(15px);
box-shadow:0 0 25px rgba(0,0,0,0.5);
margin-top:20px;
animation:fadeIn 0.5s;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.question{
font-size:25px;
margin-bottom:20px;
line-height:1.5;
}

.option{
padding:15px;
margin-bottom:12px;
background:#1e293b;
border-radius:15px;
cursor:pointer;
transition:0.3s;
border:2px solid transparent;
}

.option:hover{
background:#334155;
transform:translateX(5px);
}

.correct{
background:green !important;
border-color:white;
}

.wrong{
background:red !important;
border-color:white;
}

.info{
display:flex;
justify-content:space-between;
margin-top:20px;
font-size:18px;
flex-wrap:wrap;
gap:10px;
}

.progress{
width:100%;
height:18px;
background:#111827;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(to right,#4cc9ff,#9b5cff);
transition:0.5s;
}

.explanation{
margin-top:20px;
padding:15px;
background:#111827;
border-radius:15px;
display:none;
line-height:1.6;
}

.loading{
text-align:center;
padding:20px;
font-size:18px;
color:#4cc9ff;
}

@media(max-width:700px){

.title{
font-size:38px;
}

.question{
font-size:21px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
Ultimate AI Exam System
</div>

<div class="top-panel">

<select id="subject">
<option>History</option>
<option>Geography</option>
<option>Polity</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Biology</option>
<option>Math</option>
<option>Reasoning</option>
<option>English</option>
<option>Computer</option>
<option>Current Affairs</option>
<option>CG GK</option>
<option>UPSC</option>
<option>SSC</option>
<option>Railway</option>
<option>Vyapam</option>
</select>

<select id="difficulty">
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
</select>

<button onclick="generateMCQ()">
Generate MCQ
</button>

</div>

<div class="card">

<div class="question" id="question">
Click Generate MCQ
</div>

<div id="options"></div>

<div class="info">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="timer">30</span>s</div>
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="explanation" id="explanation"></div>

<button style="margin-top:20px;" onclick="generateMCQ()">
Next Question
</button>

</div>

</div>

<script>

const API_KEY="AIzaSyBWrtPLWF9lNnGURmXG-Gx1nvRMXANdKM4";

const API_URL=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

let score=0;
let timer=30;
let timerInterval;
let progress=0;
let currentAnswer="";

async function generateMCQ(){

clearInterval(timerInterval);

timer=30;
document.getElementById("timer").innerText=timer;

startTimer();

document.getElementById("question").innerHTML=
"<div class='loading'>Generating AI MCQ...</div>";

document.getElementById("options").innerHTML="";
document.getElementById("explanation").style.display="none";

const subject=document.getElementById("subject").value;
const difficulty=document.getElementById("difficulty").value;

const prompt=`

Generate 1 competitive exam MCQ in JSON format.

Subject: ${subject}
Difficulty: ${difficulty}

Return ONLY pure JSON.

Format:

{
"question":"",
"options":["","","",""],
"answer":"",
"explanation":""
}

Language: Hindi
`;

try{

const response=await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[

{
parts:[
{
text:prompt
}
]
}

]

})

});

const data=await response.json();

let text=data.candidates[0].content.parts[0].text;

text=text.replace(/```json/g,"")
.replace(/```/g,"")
.trim();

const mcq=JSON.parse(text);

showQuestion(mcq);

}
catch(error){

document.getElementById("question").innerHTML=
"❌ Error generating MCQ";

console.log(error);

}

}

function showQuestion(mcq){

currentAnswer=mcq.answer;

document.getElementById("question").innerText=
mcq.question;

let html="";

mcq.options.forEach(option=>{

html+=`

<div class="option"
onclick="checkAnswer(this,
'${option}',
'${mcq.answer}',
\`${mcq.explanation}\`)">

${option}

</div>

`;

});

document.getElementById("options").innerHTML=html;

progress+=10;

if(progress>100){
progress=0;
}

document.getElementById("progressBar").style.width=
progress+"%";

}

function checkAnswer(element,selected,correct,explanation){

const options=document.querySelectorAll(".option");

options.forEach(opt=>{

opt.style.pointerEvents="none";

if(opt.innerText===correct){

opt.classList.add("correct");

}

});

if(selected!==correct){

element.classList.add("wrong");

}else{

score++;

document.getElementById("score").innerText=score;

}

const exp=document.getElementById("explanation");

exp.style.display="block";

exp.innerHTML=
"<b>Explanation:</b><br><br>"+explanation;

}

function startTimer(){

timerInterval=setInterval(()=>{

timer--;

document.getElementById("timer").innerText=timer;

if(timer<=0){

clearInterval(timerInterval);

alert("⏰ Time Up!");

generateMCQ();

}

},1000);

}

</script>

</body>
</html>
