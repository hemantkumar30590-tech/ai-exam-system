<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultimate AI Exam System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(
135deg,
#020617,
#071226,
#0f172a
);

min-height:100vh;
padding:20px;
color:white;
overflow-x:hidden;
}

.container{
max-width:900px;
margin:auto;
}

.title{
font-size:55px;
font-weight:bold;
text-align:center;
margin-bottom:30px;

background:
linear-gradient(
90deg,
#38bdf8,
#8b5cf6
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.glass{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-radius:25px;
padding:25px;
box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

input,
select{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#111827;
color:white;
font-size:17px;
outline:none;
}

.api-box{
margin-bottom:20px;
}

button{
border:none;
cursor:pointer;
padding:16px;
border-radius:15px;
font-size:18px;
font-weight:bold;
transition:0.3s;
}

.generate-btn,
.next-btn{

background:
linear-gradient(
90deg,
#38bdf8,
#8b5cf6
);

color:white;
width:100%;
}

button:hover{
transform:scale(1.02);
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
font-size:22px;
}

.progress{
width:100%;
height:12px;
background:#1f2937;
border-radius:20px;
overflow:hidden;
margin-bottom:25px;
}

.progress-fill{
height:100%;
width:0%;
transition:0.5s;

background:
linear-gradient(
90deg,
#38bdf8,
#8b5cf6
);

}

.question{
font-size:28px;
line-height:1.5;
margin-bottom:25px;
}

.options{
display:grid;
gap:15px;
}

.option-btn{
background:#1e293b;
color:white;
text-align:left;
}

.option-btn:hover{
background:#334155;
}

.correct{
background:#16a34a !important;
}

.wrong{
background:#dc2626 !important;
}

.explanation{
display:none;
margin-top:20px;
padding:20px;
border-radius:15px;
background:#111827;
line-height:1.7;
}

.next-btn{
display:none;
margin-top:20px;
}

.loading{
text-align:center;
padding:30px;
font-size:24px;
animation:pulse 1s infinite;
}

@keyframes pulse{

0%{
opacity:0.4;
}

50%{
opacity:1;
}

100%{
opacity:0.4;
}

}

.leaderboard{
margin-top:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.leader-card{
background:#111827;
padding:20px;
border-radius:18px;
text-align:center;
}

.status{
margin-top:15px;
padding:15px;
border-radius:15px;
background:#111827;
line-height:1.6;
display:none;
}

.footer-note{
margin-top:20px;
font-size:14px;
line-height:1.7;
opacity:0.8;
}

@media(max-width:700px){

.title{
font-size:38px;
}

.controls{
grid-template-columns:1fr;
}

.question{
font-size:22px;
}

.topbar{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="container">

<h1 class="title">
Ultimate AI Exam System
</h1>

<div class="glass">

<div class="api-box">

<input
type="password"
id="apiKey"
placeholder="Paste Gemini API Key"
/>

</div>

<div class="controls">

<select id="subject">

<option>History</option>
<option>Geography</option>
<option>Polity</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Biology</option>
<option>Math</option>
<option>Reasoning</option>
<option>English</option>
<option>Computer</option>
<option>Current Affairs</option>
<option>CG GK</option>
<option>UPSC</option>
<option>SSC</option>
<option>Railway</option>
<option>Vyapam</option>

</select>

<select id="difficulty">

<option>Easy</option>
<option>Medium</option>
<option>Hard</option>

</select>

</div>

<button
class="generate-btn"
onclick="generateMCQ()"
>

Generate AI MCQ

</button>

<div class="status" id="statusBox"></div>

<div class="topbar">

<div>
Score:
<span id="score">0</span>
</div>

<div>
Time:
<span id="timer">0</span>s
</div>

</div>

<div class="progress">

<div
class="progress-fill"
id="progressFill"
></div>

</div>

<div
class="question"
id="question"
>

Generate your first AI MCQ 🚀

</div>

<div
class="options"
id="options"
></div>

<div
class="explanation"
id="explanation"
></div>

<button
class="next-btn"
id="nextBtn"
onclick="generateMCQ()"
>

Next Question

</button>

<div class="leaderboard">

<div class="leader-card">
<h2 id="totalQuestions">0</h2>
<p>Total Questions</p>
</div>

<div class="leader-card">
<h2 id="correctAnswers">0</h2>
<p>Correct</p>
</div>

<div class="leader-card">
<h2 id="wrongAnswers">0</h2>
<p>Wrong</p>
</div>

</div>

<div class="footer-note">

⚡ Secure System:
Your Gemini API key stays only in your browser localStorage.
It is NOT uploaded to GitHub.

</div>

</div>

</div>

<script>

const apiInput =
document.getElementById("apiKey");

const savedKey =
localStorage.getItem("gemini_api_key");

if(savedKey){

apiInput.value = savedKey;

}

let score = 0;
let total = 0;
let correct = 0;
let wrong = 0;
let progress = 0;
let timer = 0;
let timerInterval;

function saveApiKey(){

localStorage.setItem(
"gemini_api_key",
apiInput.value.trim()
);

}

function startTimer(){

clearInterval(timerInterval);

timer = 0;

document.getElementById(
"timer"
).innerText = timer;

timerInterval = setInterval(()=>{

timer++;

document.getElementById(
"timer"
).innerText = timer;

},1000);

}

function showStatus(message){

const box =
document.getElementById(
"statusBox"
);

box.style.display = "block";

box.innerHTML = message;

}

async function generateMCQ(){

const apiKey =
apiInput.value.trim();

if(!apiKey){

showStatus(
"❌ Please enter Gemini API key"
);

return;

}

saveApiKey();

startTimer();

document.getElementById(
"nextBtn"
).style.display = "none";

document.getElementById(
"explanation"
).style.display = "none";

document.getElementById(
"question"
).innerHTML =

'<div class="loading">⏳ AI Generating MCQ...</div>';

document.getElementById(
"options"
).innerHTML = "";

const subject =
document.getElementById(
"subject"
).value;

const difficulty =
document.getElementById(
"difficulty"
).value;

const prompt = `

Generate ONE Hindi MCQ.

Subject:
${subject}

Difficulty:
${difficulty}

Return ONLY valid JSON.

{
"question":"",
"options":["","","",""],
"answer":"",
"explanation":""
}

`;

try{

const response =
await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
{
parts:[
{
text:prompt
}
]
}
],

generationConfig:{
responseMimeType:
"application/json"
}

})

}

);

const data =
await response.json();

console.log(data);

if(data.error){

showStatus(
"❌ " +
data.error.message
);

document.getElementById(
"question"
).innerHTML =
"AI Error";

return;

}

const raw =
data.candidates[0]
.content.parts[0]
.text;

const clean =
raw
.replace(/```json/g,"")
.replace(/```/g,"")
.trim();

const mcq =
JSON.parse(clean);

showMCQ(mcq);

progress += 10;

if(progress > 100){
progress = 0;
}

document.getElementById(
"progressFill"
).style.width =
progress + "%";

showStatus(
"✅ AI MCQ Generated Successfully"
);

}catch(error){

console.log(error);

showStatus(
"❌ Failed to generate MCQ"
);

document.getElementById(
"question"
).innerHTML =
"Error generating MCQ";

}

}

function showMCQ(mcq){

document.getElementById(
"question"
).innerHTML =
mcq.question;

let html = "";

mcq.options.forEach(option=>{

html += `

<button
class="option-btn"
onclick="checkAnswer(
this,
\`${option}\`,
\`${mcq.answer}\`,
\`${mcq.explanation}\`
)">

${option}

</button>

`;

});

document.getElementById(
"options"
).innerHTML = html;

}

function checkAnswer(
button,
selected,
correctAnswer,
explanation
){

clearInterval(timerInterval);

const buttons =
document.querySelectorAll(
".option-btn"
);

buttons.forEach(btn=>{

btn.disabled = true;

if(
btn.innerText.trim()
===
correctAnswer.trim()
){

btn.classList.add(
"correct"
);

}

});

total++;

document.getElementById(
"totalQuestions"
).innerText = total;

if(
selected.trim()
===
correctAnswer.trim()
){

score++;
correct++;

document.getElementById(
"score"
).innerText = score;

document.getElementById(
"correctAnswers"
).innerText = correct;

button.classList.add(
"correct"
);

}else{

wrong++;

document.getElementById(
"wrongAnswers"
).innerText = wrong;

button.classList.add(
"wrong"
);

}

document.getElementById(
"explanation"
).style.display =
"block";

document.getElementById(
"explanation"
).innerHTML =

`
<h3>Explanation:</h3>
<br>
${explanation}
`;

document.getElementById(
"nextBtn"
).style.display =
"block";

}

</script>

</body>
</html>
